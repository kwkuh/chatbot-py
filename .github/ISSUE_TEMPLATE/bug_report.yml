name: 🐛 Bug report
description: Something is broken
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I run `python cli.py --provider openai`, ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal commands or code to reproduce. Redact API keys.
      render: bash
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - anthropic
        - openai
        - google
        - ollama
        - multiple / N/A
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Model
      placeholder: e.g. claude-sonnet-4-6, gpt-4o-mini, gemini-2.0-flash, llama3.2
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: e.g. 3.12.3
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 14.5, Ubuntu 22.04
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      render: shell
